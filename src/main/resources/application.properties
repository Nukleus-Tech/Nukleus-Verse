server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql:///nukleusverse
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.hikari.data-source-properties.socketFactory=com.google.cloud.sql.postgres.SocketFactory
spring.datasource.hikari.data-source-properties.cloudSqlInstance=${INSTANCE_CONNECTION_NAME}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true